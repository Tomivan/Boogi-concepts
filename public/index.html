<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Boogi-Noire - Luxury handcrafted fragrances with gold-standard elegance"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/static/media/background.ab1ba25348028f65df05.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/static/media/background-mobile.ab1ba25348028f65df05.webp" media="(max-width: 767px)">
    <link rel="preload" as="image" href="/static/media/background-tablet.ab1ba25348028f65df05.webp" media="(min-width: 768px) and (max-width: 1024px)">
    
    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://bogi-noir.firebaseapp.com" crossorigin>
    <link rel="preconnect" href="https://firebase.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://apis.google.com" crossorigin>

    <!-- DNS prefetch as fallback for browsers that don't support preconnect -->
    <link rel="dns-prefetch" href="https://bogi-noir.firebaseapp.com">
    <link rel="dns-prefetch" href="https://firebase.googleapis.com">
    <link rel="dns-prefetch" href="https://firestore.googleapis.com">
    <link rel="dns-prefetch" href="https://apis.google.com">

    <!-- Inline Critical CSS for hero section -->
    <style>
      /* Critical CSS - loads immediately */
      .hero-carousel {
          position: relative;
          width: 100%;
          overflow: hidden;
      }

      .hero-carousel__track {
          position: relative;
          width: 100%;
          aspect-ratio: 21 / 9;
      }

      .hero-carousel__slide {
          position: absolute;
          inset: 0;
          opacity: 0;
          transition: opacity 0.6s ease;
      }

      .hero-carousel__slide.active {
          opacity: 1;
      }

      .hero-carousel__image {
          width: 100%;
          height: 100%;
          object-fit: cover;
          object-position: center top;
      }

      .hero-carousel__controls {
          position: absolute;
          inset: 0;
          pointer-events: none;
          z-index: 30;
      }

      .hero-carousel__btn {
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          background: rgba(0, 0, 0, 0.5);
          color: white;
          border: none;
          width: 60px;
          height: 60px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 3rem;
          cursor: pointer;
          pointer-events: auto;
          z-index: 31;
      }

      .hero-carousel__btn--prev { left: 20px; }
      .hero-carousel__btn--next { right: 20px; }

      .hero-carousel__dots {
          position: absolute;
          bottom: 30px;
          left: 50%;
          transform: translateX(-50%);
          display: flex;
          gap: 12px;
          background: rgba(0, 0, 0, 0.3);
          padding: 8px 16px;
          border-radius: 30px;
          pointer-events: auto;
      }

      .hero-carousel__dot {
          width: 12px;
          height: 12px;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.6);
          border: none;
          cursor: pointer;
          transition: all 0.3s ease;
      }

      .hero-carousel__dot.active {
          background: #ffd700;
          transform: scale(1.2);
      }

      .content {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          text-align: center;
          z-index: 20;
          width: 90%;
          max-width: 900px;
          padding: 2rem;
      }

      h2 {
          color: #ffd700;
          font-size: 3.5rem;
          margin: 0 0 1rem 0;
          font-weight: 400;
          letter-spacing: 2px;
      }

      .white {
          color: white;
          font-size: 1.35rem;
          line-height: 1.8;
          font-weight: 300;
      }

      @media screen and (max-width: 767px) {
          .hero-carousel__track {
              aspect-ratio: 4 / 3;
          }
  
          .hero-carousel__btn {
              width: 40px;
              height: 40px;
              font-size: 2rem;
          }
          
          .hero-carousel__dots {
              bottom: 20px;
              padding: 6px 12px;
          }
      }
    </style>

    <!-- Load full CSS asynchronously -->
    <link rel="preload" href="%PUBLIC_URL%/static/css/main.26e60f58.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="%PUBLIC_URL%/static/css/main.26e60f58.css"></noscript>

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>Boogi-Noire | Luxury Handcrafted Fragrances</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
